const getCourse=(id)=>COURSES.find(c=>c.id===id)||COURSES[0];
const estimateLayout=(centerLat,centerLng,yardages,pars)=>{
// Generate realistic green + tee positions in a loop pattern around clubhouse
const n=yardages.length;const greens=[];const teeBoxes=[];
const mPerYd=0.9144;const latDeg=0.00000904;const lngDeg=latDeg/Math.cos(centerLat*Math.PI/180);
// Golf courses typically form two loops: front 9 goes out and back, back 9 same
// Use a gentle spiral with direction changes
let curLat=centerLat;let curLng=centerLng;
let heading=0; // start heading north
for(let i=0;i<n;i++){
// Tee box = current position
teeBoxes.push({lat:curLat,lng:curLng});
// Determine hole direction with gentle turns
const loop=i<9?0:1; // front 9 vs back 9
const holeInLoop=i%9;
// Create a figure-8 pattern
if(holeInLoop<=3)heading+=15+Math.random()*20; // curve outward
else if(holeInLoop<=5)heading+=40+Math.random()*20; // turn back
else heading+=25+Math.random()*15; // come home
if(loop===1)heading+=10; // offset back 9
// Place green at yardage distance along heading
const yd=yardages[i]||350;
const distM=yd*mPerYd;
const headRad=heading*Math.PI/180;
const greenLat=curLat+(Math.cos(headRad)*distM*latDeg);
const greenLng=curLng+(Math.sin(headRad)*distM*lngDeg);
greens.push({lat:greenLat,lng:greenLng});
// Next tee is near this green (slight offset toward next direction)
curLat=greenLat+(Math.cos((heading+30)*Math.PI/180)*30*latDeg);
curLng=greenLng+(Math.sin((heading+30)*Math.PI/180)*30*lngDeg);
}
return{greens,teeBoxes};
};

const useGPS=()=>{
const[pos,setPos]=useState(null);const[err,setErr]=useState(null);const[on,setOn]=useState(false);const ref=useRef(null);const hist=useRef([]);
const smooth=(p)=>{hist.current.push(p);if(hist.current.length>5)hist.current.shift();

const w=hist.current.map((h,i)=>{const age=(Date.now()-(h.ts||Date.now()))/1000;const accW=1/Math.max(1,h.acc);const recW=1/(1+age*0.5);return{...h,w:accW*recW};});
const tw=w.reduce((s,h)=>s+h.w,0);
return{lat:w.reduce((s,h)=>s+h.lat*h.w,0)/tw,lng:w.reduce((s,h)=>s+h.lng*h.w,0)/tw,acc:Math.min(...hist.current.map(h=>h.acc)),ts:Date.now(),speed:p.speed,heading:p.heading};};
const start=useCallback(()=>{if(!navigator.geolocation){setErr("GPS unavailable");return;}setOn(true);hist.current=[];
ref.current=navigator.geolocation.watchPosition(p=>{const raw={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy,speed:p.coords.speed,heading:p.coords.heading,ts:Date.now()};
setPos(smooth(raw));},e=>setErr(e.message),{enableHighAccuracy:true,maximumAge:1000,timeout:8000});},[]);
const stop=useCallback(()=>{if(ref.current!==null){navigator.geolocation.clearWatch(ref.current);ref.current=null;}setOn(false);hist.current=[];},[]);
const once=useCallback(()=>new Promise((res,rej)=>{if(!navigator.geolocation){rej("GPS unavailable");return;}navigator.geolocation.getCurrentPosition(p=>{const o={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy,ts:Date.now()};setPos(o);res(o);},e=>{setErr(e.message);rej(e.message);},{enableHighAccuracy:true,timeout:8000});}),[]);
return{pos,err,on,start,stop,once};

function GreenMap3D({holeIdx,theme:T,onClose}){
const canvasRef=useRef(null);const frameRef=useRef(null);const[ballPos,setBallPos]=useState(null);const[readLine,setReadLine]=useState(null);
const contour=GREEN_CONTOURS[holeIdx%GREEN_CONTOURS.length];
const isDk=T.bg==="#09090b";
const hp=holeIdx+1;
// Generate elevation at any point
const getElev=(nx,ny)=>{
const slopeRad=contour.slope*Math.PI/180;
const slopeX=Math.sin(slopeRad)*contour.grade/100;
const slopeY=-Math.cos(slopeRad)*contour.grade/100;
let h=nx*slopeX+ny*slopeY;
// Add tier
if(contour.tiers>1){
contour.ridges.forEach(r=>{
const rRad=r.dir*Math.PI/180;
const proj=nx*Math.cos(rRad)+ny*Math.sin(rRad);
const dist=Math.abs(proj-r.pos+0.5);
h+=r.h*Math.max(0,1-dist*4)*Math.exp(-dist*dist*8);
});
}
// Bowl effect (edges higher)
const edgeDist=Math.sqrt(nx*nx+ny*ny);
h+=edgeDist*edgeDist*0.015;
return h;
};
// Calculate break from ball to pin
const calcRead=(bx,by)=>{
const px=contour.pin.x,py=contour.pin.y;
const steps=20;const dx=(px-bx)/steps,dy=(py-by)/steps;
let totalBreakX=0,totalBreakY=0;
const path=[{x:bx,y:by}];
for(let i=0;i<steps;i++){
const cx=bx+dx*i,cy=by+dy*i;
const e0=getElev(cx,cy);
const gx=(getElev(cx+0.01,cy)-getElev(cx-0.01,cy))/0.02;
const gy=(getElev(cx,cy+0.01)-getElev(cx,cy-0.01))/0.02;
totalBreakX+=gx;totalBreakY+=gy;
path.push({x:cx+dx-gx*0.08,y:cy+dy-gy*0.08});
}
path.push({x:px,y:py});
const breakAmt=Math.sqrt(totalBreakX*totalBreakX+totalBreakY*totalBreakY);
const breakDir=Math.atan2(totalBreakX,totalBreakY)*180/Math.PI;
const dist=Math.sqrt((px-bx)*(px-bx)+(py-by)*(py-by));
return{path,breakAmt:Math.round(breakAmt*100)/10,breakDir:Math.round(breakDir),dist:Math.round(dist*30),slopePct:Math.round(contour.grade*10)/10};
};
useEffect(()=>{
const canvas=canvasRef.current;if(!canvas)return;
const ctx=canvas.getContext("2d");
const W=canvas.width,H=canvas.height;
const cx=W/2,cy=H/2,scale=Math.min(W,H)*0.38;
const draw=()=>{
ctx.clearRect(0,0,W,H);
// Background
ctx.fillStyle=isDk?"#0a0f0a":"#f0f8f0";
ctx.fillRect(0,0,W,H);
// Draw green surface with elevation coloring
const res=3;
for(let px=0;px<W;px+=res){for(let py=0;py<H;py+=res){
const nx=(px-cx)/scale,ny=(py-cy)/scale;
const dist=Math.sqrt(nx*nx+ny*ny);
// Green shape mask
let inGreen=false;
if(contour.shape==="round")inGreen=dist<1;
else if(contour.shape==="oval")inGreen=Math.sqrt((nx*0.8)**2+(ny*1.2)**2)<1;
else if(contour.shape==="wide")inGreen=Math.sqrt((nx*1.2)**2+(ny*0.8)**2)<1;
else if(contour.shape==="kidney"){const kd=Math.sqrt((nx+0.15)**2+ny*ny);const kd2=Math.sqrt((nx-0.15)**2+ny*ny);inGreen=Math.min(kd,kd2)<0.9||dist<0.75;}
else inGreen=dist<1;
if(!inGreen){
// Fringe/collar
const fringeDist=contour.shape==="round"?dist:
contour.shape==="oval"?Math.sqrt((nx*0.8)**2+(ny*1.2)**2):
contour.shape==="wide"?Math.sqrt((nx*1.2)**2+(ny*0.8)**2):dist;
if(fringeDist<1.12){ctx.fillStyle=isDk?"#1a3a1a":"#3a7a3a";ctx.fillRect(px,py,res,res);}
continue;
}
const elev=getElev(nx,ny);
// Map elevation to color (low=dark green -> high=light green/yellow)
const norm=Math.max(0,Math.min(1,(elev+0.06)/0.12));
const r=isDk?Math.round(20+norm*60):Math.round(40+norm*80);
const g=isDk?Math.round(80+norm*80):Math.round(140+norm*60);
const b=isDk?Math.round(30+norm*20):Math.round(50+norm*30);
ctx.fillStyle="rgb("+r+","+g+","+b+")";
ctx.fillRect(px,py,res,res);
}}
// Contour lines
ctx.strokeStyle=isDk?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.06)";
ctx.lineWidth=0.8;
for(let lev=-0.08;lev<0.08;lev+=0.015){
ctx.beginPath();
let started=false;
for(let a=0;a<Math.PI*2;a+=0.05){
for(let r=0;r<1;r+=0.01){
const nx=Math.cos(a)*r,ny=Math.sin(a)*r;
if(Math.abs(getElev(nx,ny)-lev)<0.003){
const px=cx+nx*scale,py=cy+ny*scale;
if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);
break;}}}
ctx.stroke();}
// Slope arrows grid
const arrowSpacing=0.35;
for(let ax=-0.8;ax<=0.8;ax+=arrowSpacing){for(let ay=-0.8;ay<=0.8;ay+=arrowSpacing){
const dist2=Math.sqrt(ax*ax+ay*ay);if(dist2>0.85)continue;
const gx=(getElev(ax+0.02,ay)-getElev(ax-0.02,ay))/0.04;
const gy=(getElev(ax,ay+0.02)-getElev(ax,ay-0.02))/0.04;
const mag=Math.sqrt(gx*gx+gy*gy);if(mag<0.001)continue;
const px=cx+ax*scale,py=cy+ay*scale;
const len=Math.min(18,mag*800);
const angle=Math.atan2(gy,gx);
ctx.save();ctx.translate(px,py);ctx.rotate(angle);
ctx.strokeStyle=isDk?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.15)";
ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(len,0);ctx.stroke();
ctx.fillStyle=isDk?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.2)";
ctx.beginPath();ctx.moveTo(len,0);ctx.lineTo(len-4,-3);ctx.lineTo(len-4,3);ctx.closePath();ctx.fill();
ctx.restore();
}}
// Pin
const pinPx=cx+contour.pin.x*scale,pinPy=cy+contour.pin.y*scale;
ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(pinPx,pinPy,3,0,Math.PI*2);ctx.fill();
ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pinPx,pinPy);ctx.lineTo(pinPx,pinPy-22);ctx.stroke();
ctx.fillStyle="#ef4444";ctx.beginPath();ctx.moveTo(pinPx,pinPy-22);ctx.lineTo(pinPx+12,pinPy-18);ctx.lineTo(pinPx,pinPy-14);ctx.closePath();ctx.fill();
// Ball position & read line
if(ballPos){
const bpx=cx+ballPos.x*scale,bpy=cy+ballPos.y*scale;
ctx.fillStyle="#fff";ctx.strokeStyle="#222";ctx.lineWidth=2;
ctx.beginPath();ctx.arc(bpx,bpy,5,0,Math.PI*2);ctx.fill();ctx.stroke();
}
if(readLine&&readLine.path){
ctx.strokeStyle="rgba(255,200,0,0.6)";ctx.lineWidth=2.5;ctx.setLineDash([6,4]);
ctx.beginPath();
readLine.path.forEach((p,i)=>{
const px=cx+p.x*scale,py=cy+p.y*scale;
if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
});ctx.stroke();ctx.setLineDash([]);
}
};
draw();
},[holeIdx,ballPos,readLine,T.bg]);
// Handle tap to place ball
const handleTap=(e)=>{
const canvas=canvasRef.current;if(!canvas)return;
const rect=canvas.getBoundingClientRect();
const scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;
const px=(e.clientX-rect.left)*scaleX,py=(e.clientY-rect.top)*scaleY;
const cx=canvas.width/2,cy=canvas.height/2,scale=Math.min(canvas.width,canvas.height)*0.38;
const nx=(px-cx)/scale,ny=(py-cy)/scale;
const dist=Math.sqrt(nx*nx+ny*ny);
if(dist>1.1)return;
setBallPos({x:nx,y:ny});
setReadLine(calcRead(nx,ny));
};
return(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:200,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(12px)",display:"flex",flexDirection:"column"}}>

function SwingAnalyzer({T,profile}){
const[video,setVideo]=useState(null);const[videoUrl,setVideoUrl]=useState(null);
const[analyzing,setAnalyzing]=useState(false);const[result,setResult]=useState(null);const[error,setError]=useState(null);
const[progress,setProgress]=useState("");
const videoRef=useRef(null);const canvasRef=useRef(null);
const extractFrames=async(videoEl)=>{
const canvas=canvasRef.current;const ctx=canvas.getContext("2d");
const dur=videoEl.duration;
canvas.width=Math.min(videoEl.videoWidth,720);
canvas.height=Math.round(canvas.width*(videoEl.videoHeight/videoEl.videoWidth));
// Extract 6 key frames across the swing
const times=[0.05,0.2,0.4,0.55,0.7,0.9].map(t=>t*dur);
const frames=[];
for(const t of times){
await new Promise(res=>{videoEl.currentTime=t;videoEl.onseeked=res;});
ctx.drawImage(videoEl,0,0,canvas.width,canvas.height);
frames.push({time:Math.round(t*100)/100,data:canvas.toDataURL("image/jpeg",0.8),
label:t<dur*0.15?"Address":t<dur*0.35?"Backswing":t<dur*0.5?"Top":t<dur*0.6?"Downswing":t<dur*0.75?"Impact":"Follow-through"});
}
return frames;
};
const analyzeSwing=async()=>{
if(!videoRef.current)return;
setAnalyzing(true);setError(null);setResult(null);
try{
setProgress("Extracting key positions...");
const frames=await extractFrames(videoRef.current);
setProgress("Analyzing with AI...");
const content=frames.map(f=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:f.data.split(",")[1]}}));
content.push({type:"text",text:`Analyze this golf swing sequence. The 6 frames show: ${frames.map(f=>f.label).join(", ")}.

Provide a structured analysis in this EXACT JSON format (no markdown, no backticks, just raw JSON):
{
"overall_grade": "A/B/C/D letter grade",
"tempo_rating": "1-10 score",
"summary": "One sentence overall assessment",
"positions": [
{"name": "Address", "grade": "A-D", "note": "Brief observation"},
{"name": "Backswing", "grade": "A-D", "note": "Brief observation"},
{"name": "Top of Swing", "grade": "A-D", "note": "Brief observation"},
{"name": "Downswing", "grade": "A-D", "note": "Brief observation"},
{"name": "Impact", "grade": "A-D", "note": "Brief observation"},
{"name": "Follow-through", "grade": "A-D", "note": "Brief observation"}
],
"strengths": ["strength 1", "strength 2"],
"improvements": ["improvement 1", "improvement 2", "improvement 3"],
"drill": {"name": "Recommended drill name", "description": "How to do it in 2 sentences"}
}`});
const resp=await fetch("https://api.anthropic.com/v1/messages",{
method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content}]})
});
const data=await resp.json();
const text=data.content.map(b=>b.text||"").join("");
const clean=text.replace(/```json|```/g,"").trim();
const parsed=JSON.parse(clean);
setResult(parsed);setProgress("");
}catch(e){console.error(e);setError("Analysis failed. Try a clearer video with good lighting.");setProgress("");}
setAnalyzing(false);
};
const handleFile=(e)=>{
const file=e.target.files[0];if(!file)return;
setVideo(file);setVideoUrl(URL.createObjectURL(file));setResult(null);setError(null);
};
const gradeColor=(g)=>g==="A"?"#10b981":g==="B"?"#60a5fa":g==="C"?"#fbbf24":"#f87171";
if(result)return <div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
<div style={{fontSize:16,fontWeight:700,color:T.tx,fontFamily:F}}>Swing Analysis</div>
<button onClick={()=>{setResult(null);setVideo(null);setVideoUrl(null);}} style={{padding:"6px 12px",borderRadius:8,background:"rgba(128,128,128,0.06)",border:"1px solid "+T.bdr,color:T.td,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F}}>New</button>
</div>
{/* Overall grade */}
<Crd T={T} style={{marginBottom:8,display:"flex",alignItems:"center",gap:14}}>
<div style={{width:56,height:56,borderRadius:14,background:gradeColor(result.overall_grade)+"18",border:"2px solid "+gradeColor(result.overall_grade),display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:800,color:gradeColor(result.overall_grade),fontFamily:M}}>{result.overall_grade}</div>
<div style={{flex:1}}>
<div style={{fontSize:14,fontWeight:700,color:T.tx,fontFamily:F}}>Overall Grade</div>
<div style={{fontSize:11,color:T.td,fontFamily:F,marginTop:2}}>{result.summary}</div>
<div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
<div style={{fontSize:9,color:T.td,fontFamily:F}}>Tempo</div>
<div style={{flex:1,height:4,background:"rgba(128,128,128,0.08)",borderRadius:2}}>
<div style={{width:(result.tempo_rating||5)*10+"%",height:"100%",borderRadius:2,background:T.g}}/></div>
<div style={{fontSize:11,fontWeight:700,color:T.g,fontFamily:M}}>{result.tempo_rating}/10</div>
</div></div>
</Crd>
{/* Position grades */}
<Crd T={T} style={{marginBottom:8}}>
<Lbl T={T}>Position Breakdown</Lbl>
{(result.positions||[]).map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderTop:i>0?"1px solid "+T.bdr:"none"}}>
<div style={{width:24,height:24,borderRadius:6,background:gradeColor(p.grade)+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:gradeColor(p.grade),fontFamily:M}}>{p.grade}</div>
<div style={{flex:1}}>
<div style={{fontSize:11,fontWeight:600,color:T.tx,fontFamily:F}}>{p.name}</div>
<div style={{fontSize:10,color:T.td,fontFamily:F}}>{p.note}</div>
</div></div>)}
</Crd>
{/* Strengths & Improvements */}
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
<Crd T={T}>
<Lbl T={T}>Strengths</Lbl>
{(result.strengths||[]).map((s,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:4}}>
<span style={{color:T.g,fontSize:11}}>{"✓"}</span>
<span style={{fontSize:11,color:T.tx,fontFamily:F,lineHeight:1.4}}>{s}</span>
</div>)}
</Crd>
<Crd T={T}>
<Lbl T={T}>Work On</Lbl>
{(result.improvements||[]).map((s,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:4}}>
<span style={{color:T.o,fontSize:11}}>{"→"}</span>
<span style={{fontSize:11,color:T.tx,fontFamily:F,lineHeight:1.4}}>{s}</span>
</div>)}
</Crd>
</div>
{/* Drill */}
{result.drill&&<Crd T={T} style={{background:T.bg==="#09090b"?"linear-gradient(135deg, #0f1f15 0%, #111114 100%)":T.card,border:"1px solid "+T.gb}}>
<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.g} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
<div style={{fontSize:10,color:T.g,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:F}}>Recommended Drill</div>
</div>
<div style={{fontSize:13,fontWeight:700,color:T.tx,fontFamily:F}}>{result.drill.name}</div>
<div style={{fontSize:11,color:T.td,fontFamily:F,marginTop:4,lineHeight:1.5}}>{result.drill.description}</div>
</Crd>}
{/* Frame strip */}
{videoUrl&&<div style={{marginTop:8}}><Lbl T={T}>Key Frames</Lbl>
<div style={{display:"flex",gap:3,overflowX:"auto",paddingBottom:4}}>
{(result.positions||[]).map((p,i)=><div key={i} style={{flexShrink:0,width:64,textAlign:"center"}}>
<div style={{width:64,height:48,borderRadius:6,overflow:"hidden",border:"1px solid "+T.bdr,background:"#000",marginBottom:3}}>
<video ref={el=>{if(el){el.src=videoUrl;el.currentTime=[0.05,0.2,0.4,0.55,0.7,0.9][i]*(el.duration||2);}}} muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
</div>
<div style={{fontSize:7,color:gradeColor(p.grade),fontWeight:700,fontFamily:F}}>{p.name}</div>
</div>)}
</div></div>}
</div>;
return <div>
<div style={{fontSize:16,fontWeight:700,color:T.tx,fontFamily:F,marginBottom:12}}>AI Swing Analyzer</div>
{!videoUrl?<Crd T={T} style={{textAlign:"center",padding:"30px 20px"}}>
<svg width="48" height="48" viewBox="0 0 48 48" fill="none" style={{margin:"0 auto 12px",display:"block"}}>

<circle cx="24" cy="24" r="8" stroke={T.g} strokeWidth="1.5" fill="none" opacity="0.4"/>
<circle cx="24" cy="24" r="3" fill={T.g} opacity="0.3"/>
<circle cx="38" cy="14" r="2" fill={T.r} opacity="0.5"/>
</svg>
<div style={{fontSize:14,fontWeight:700,color:T.tx,fontFamily:F,marginBottom:4}}>Record Your Swing</div>

<label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"12px 24px",borderRadius:10,background:T.g,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:F}}>

// Fit bounds
const bounds=new google.maps.LatLngBounds();
if(tee)bounds.extend(tee);bounds.extend(green);
visible.forEach(s=>bounds.extend({lat:s.lat,lng:s.lng}));
if(bounds.getNorthEast().equals(bounds.getSouthWest())){map.setCenter(green);map.setZoom(18);}
else map.fitBounds(bounds,{top:80,bottom:120,left:20,right:20});
},[curHole,curShot,gmReady]);
// Playback engine
useEffect(()=>{
if(!playing)return;
timerRef.current=setInterval(()=>{
setCurShot(prev=>{
const next=prev+1;
if(next>=currentShots.length){
// Move to next hole
setCurHole(h=>{
const nextH=h+1;
if(nextH>=round.holes.length){setPlaying(false);return h;}
return nextH;
});
return -1; // reset shot counter, will trigger hole change
}
return next;
});
},2000/speed);
return()=>clearInterval(timerRef.current);
},[playing,speed,currentShots.length,curHole]);
// Score for display
const sc=currentHoleData?currentHoleData.sc:0;const par=currentHoleData?currentHoleData.par:0;
const diff=sc-par;const diffStr=diff>0?"+"+diff:diff===0?"E":""+diff;
const diffColor=diff<0?"#10b981":diff===0?"#60a5fa":"#fb923c";
const totalScore=round.holes.reduce((s,h)=>s+(h.sc||0),0);const totalPar=round.holes.reduce((s,h)=>s+(h.par||0),0);
return <div style={{position:"fixed",inset:0,zIndex:200,background:"#000",display:"flex",flexDirection:"column"}}>
{/* Map */}
<div ref={mapRef} style={{flex:1,width:"100%"}}/>
{/* Top bar */}
<div style={{position:"absolute",top:0,left:0,right:0,padding:"env(safe-area-inset-top, 12px) 16px 10px",background:"linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
<div>
<div style={{fontSize:16,fontWeight:800,color:"#fff",fontFamily:F}}>{round.course_name||round.courseName}</div>
<div style={{fontSize:11,color:"rgba(255,255,255,0.5)",fontFamily:F}}>{new Date(round.date).toLocaleDateString()+" \u00b7 Score: "+totalScore+" ("+(totalScore-totalPar>=0?"+":"")+(totalScore-totalPar)+")"}</div>
</div>
<button onClick={onClose} style={{padding:"8px 14px",borderRadius:8,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:F,backdropFilter:"blur(8px)"}}>Close</button>
</div>
{/* Bottom controls */}
<div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.8) 70%, transparent 100%)",padding:"20px 16px env(safe-area-inset-bottom, 16px)"}}>
{/* Hole info */}
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
<div>
<div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:F}}>{"Hole "+(curHole+1)}</div>
<div style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontFamily:F}}>{"Par "+par+" \u00b7 "+currentShots.length+" shots"}</div>
</div>
<div style={{textAlign:"right"}}>
<div style={{fontSize:28,fontWeight:800,color:diffColor,fontFamily:M}}>{sc||"-"}</div>
<div style={{fontSize:11,color:diffColor,fontFamily:F,fontWeight:600}}>{sc?diffStr:""}</div>
</div>
</div>
{/* Shot scrubber */}
{currentShots.length>0&&<div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
{currentShots.map((s,i)=>{
const isActive=i===curShot;const isPast=i<curShot;
return <button key={i} onClick={()=>{setCurShot(i);setPlaying(false);}} style={{minWidth:36,height:36,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",
background:isActive?"#f59e0b":isPast?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.06)",
border:isActive?"2px solid #fff":"1px solid "+(isPast?"rgba(245,158,11,0.3)":"rgba(255,255,255,0.1)"),
color:isActive?"#000":isPast?"#f59e0b":"rgba(255,255,255,0.3)",fontSize:12,fontWeight:700,fontFamily:M,cursor:"pointer",flexShrink:0,transition:"all 0.2s"}}>{i+1}</button>;
})}</div>}
{/* Playback controls */}
<div style={{display:"flex",alignItems:"center",gap:10}}>
{/* Prev hole */}
<button onClick={()=>{if(curHole>0){setCurHole(curHole-1);setCurShot(-1);setPlaying(false);}}} disabled={curHole===0} style={{width:36,height:36,borderRadius:8,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:curHole===0?"rgba(255,255,255,0.15)":"#fff",fontSize:16,cursor:curHole===0?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u25C0"}</button>
{/* Play/Pause */}
<button onClick={()=>{if(!playing&&curShot>=currentShots.length-1){setCurShot(-1);}setPlaying(p=>!p);}} style={{flex:1,height:44,borderRadius:10,background:playing?"rgba(245,158,11,0.15)":"#f59e0b",border:playing?"1px solid rgba(245,158,11,0.3)":"none",color:playing?"#f59e0b":"#000",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:F,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
{playing?<><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>Pause</>:<><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>Play</>}
</button>
{/* Next hole */}
<button onClick={()=>{if(curHole<round.holes.length-1){setCurHole(curHole+1);setCurShot(-1);setPlaying(false);}}} disabled={curHole>=round.holes.length-1} style={{width:36,height:36,borderRadius:8,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:curHole>=round.holes.length-1?"rgba(255,255,255,0.15)":"#fff",fontSize:16,cursor:curHole>=round.holes.length-1?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u25B6"}</button>
{/* Speed */}
<button onClick={()=>setSpeed(s=>s>=3?0.5:s+0.5)} style={{width:44,height:36,borderRadius:8,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:M}}>{speed+"x"}</button>
</div>
{/* Hole dots */}
<div style={{display:"flex",gap:3,marginTop:10,justifyContent:"center"}}>
{round.holes.map((h,i)=>{
const isActive=i===curHole;const isPast=i<curHole;const d=h.sc-h.par;
const bg=isActive?"#f59e0b":isPast?(d<0?"#10b981":d===0?"#60a5fa":"#fb923c"):"rgba(255,255,255,0.1)";
return <button key={i} onClick={()=>{setCurHole(i);setCurShot(-1);setPlaying(false);}} style={{width:isActive?24:16,height:6,borderRadius:3,background:bg,border:"none",cursor:"pointer",transition:"all 0.2s",opacity:isActive?1:isPast?0.7:0.3}}/>;
})}
</div>
</div>
</div>;
}

function Rounds({rounds,onDel,T,onToggle,profile}){
const[replayRound,setReplayRound]=useState(null);
if(!rounds.length)return <div><Hdr title="Rounds" sub="History" T={T} onToggleTheme={onToggle} profile={profile}/><div style={{padding:"0 16px"}}>
<div style={{borderRadius:16,overflow:"hidden",position:"relative",border:"1px solid "+T.bdr}}>
<div style={{position:"absolute",inset:0,backgroundImage:"url(https://images.unsplash.com/photo-1593111774240-d529f12cf4bb?w=600&q=70)",backgroundSize:"cover",backgroundPosition:"center"}}/>
<div style={{position:"absolute",inset:0,background:"linear-gradient(180deg, rgba(9,9,11,0.4) 0%, rgba(9,9,11,0.9) 100%)"}}/>
<div style={{position:"relative",padding:"40px 24px",textAlign:"center"}}>
<div style={{color:"#fff",fontSize:18,fontWeight:700,fontFamily:F}}>No rounds yet</div>
<div style={{color:"rgba(255,255,255,0.55)",fontSize:12,fontFamily:F,marginTop:6}}>Play your first round and your history will appear here</div>
</div></div></div></div>;
if(replayRound)return <RoundReplay round={replayRound} onClose={()=>setReplayRound(null)} T={T}/>;
if(replayRound){const rc=COURSES.find(x=>x.id===replayRound.course_id)||getCourse(replayRound.course_id);
return <ShotReplay round={replayRound} course={rc} T={T} onClose={()=>setReplayRound(null)}/>;}
return <div><Hdr title="Rounds" sub={rounds.length+" recorded"} T={T} onToggleTheme={onToggle} profile={profile}/>
<div style={{padding:"0 16px 100px",overflowY:"auto",height:"calc(100vh - 120px)"}}>{rounds.slice().reverse().map(r=>{const t=r.holes.reduce((s,h)=>s+(h.sc||0),0),p=r.holes.reduce((s,h)=>s+(h.par||0),0),pt=r.holes.reduce((s,h)=>s+(h.pt||0),0);return <Crd key={r.id} T={T} style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{color:T.tx,fontSize:14,fontWeight:600,fontFamily:F}}>{r.course_name||r.courseName}</div><div style={{color:T.td,fontSize:11,fontFamily:F,marginTop:2}}>{new Date(r.date).toLocaleDateString()+" \u00b7 "+r.holes.length+"h"}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:700,color:T.tx,fontFamily:M,lineHeight:1}}>{t}</div><Diff d={t-p} style={{fontSize:12}} T={T}/></div></div><div style={{display:"flex",gap:8,marginTop:8,paddingTop:8,borderTop:"1px solid "+T.bdr,flexWrap:"wrap"}}>
<span style={{fontSize:10,color:T.td,fontFamily:M,background:"rgba(128,128,128,0.06)",padding:"2px 6px",borderRadius:4}}>{"F9: "+r.holes.slice(0,9).reduce((s,h)=>s+(h.sc||0),0)}</span>
<span style={{fontSize:10,color:T.td,fontFamily:M,background:"rgba(128,128,128,0.06)",padding:"2px 6px",borderRadius:4}}>{"B9: "+r.holes.slice(9).reduce((s,h)=>s+(h.sc||0),0)}</span>
<span style={{fontSize:10,color:T.td,fontFamily:F}}>{pt+" putts"}</span>{r.cr&&<span style={{fontSize:11,color:T.td,fontFamily:F}}>{"CR "+r.cr}</span>}{r.sr&&<span style={{fontSize:11,color:T.td,fontFamily:F}}>{"SR "+r.sr}</span>}<button onClick={()=>setReplayRound(r)} style={{background:"none",border:"none",color:T.b,fontSize:11,cursor:"pointer",fontFamily:F,fontWeight:600}}>Replay</button>
<button onClick={()=>{
const txt=r.course_name+" | "+new Date(r.date).toLocaleDateString()+"\n"+
"Score: "+t+" ("+(t-p>=0?"+":"")+(t-p)+") | Putts: "+pt+"\n"+
(r.cr?"Rating: "+r.cr+" | Slope: "+r.sr+"\n":"")+
"\ud83c\udfcc\ufe0f Tracked with STICKS";
if(navigator.share)navigator.share({title:"STICKS Round",text:txt}).catch(()=>{});
else{navigator.clipboard.writeText(txt);alert("Round copied to clipboard!");}
}} style={{background:"none",border:"none",color:T.g,fontSize:11,cursor:"pointer",fontFamily:F,fontWeight:600}}>Share</button>
{r.holes.some(h=>h.shots&&h.shots.length>0)&&<button onClick={()=>setReplayRound(r)} style={{background:"none",border:"none",color:T.b,fontSize:11,cursor:"pointer",fontFamily:F,fontWeight:600,display:"flex",alignItems:"center",gap:3}}>
<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>Replay</button>}
<button onClick={()=>onDel(r.id)} style={{marginLeft:"auto",background:"none",border:"none",color:T.td,fontSize:11,cursor:"pointer",fontFamily:F}}>Delete</button></div></Crd>;})}</div></div>;
}
function Bag({rounds,T,onToggle,profile,isPro,onUpgrade}){
const stats=useMemo(()=>{const s={};rounds.forEach(r=>r.holes.forEach(h=>{if(h.cl&&h.yd){if(!s[h.cl])s[h.cl]={d:[],n:0};s[h.cl].d.push(h.yd);s[h.cl].n++;}}));return Object.entries(s).map(([cl,d])=>({cl:cl,n:d.n,avg:Math.round(d.d.reduce((s,x)=>s+x,0)/d.d.length),max:Math.max(...d.d),min:Math.min(...d.d)})).sort((a,b)=>b.avg-a.avg);},[rounds]);
return <div><Hdr title="My Bag" sub="Club distances" T={T} onToggleTheme={onToggle} profile={profile}/>
<div style={{padding:"0 16px 100px",overflowY:"auto",height:"calc(100vh - 120px)"}}>{!stats.length?<div style={{padding:"0"}}>
<div style={{borderRadius:16,overflow:"hidden",position:"relative",border:"1px solid "+T.bdr}}>
<div style={{position:"absolute",inset:0,backgroundImage:"url(https://images.unsplash.com/photo-1595429035839-c99c298ffdde?w=600&q=70)",backgroundSize:"cover",backgroundPosition:"center"}}/>
<div style={{position:"absolute",inset:0,background:"linear-gradient(180deg, rgba(9,9,11,0.35) 0%, rgba(9,9,11,0.9) 100%)"}}/>
<div style={{position:"relative",padding:"40px 24px",textAlign:"center"}}>
<div style={{color:"#fff",fontSize:18,fontWeight:700,fontFamily:F}}>Your Bag</div>
<div style={{color:"rgba(255,255,255,0.55)",fontSize:12,fontFamily:F,marginTop:6}}>Track yardage to see your real club averages</div>
</div></div></div>
:stats.map(s=><Crd key={s.cl} T={T} style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{color:T.tx,fontSize:14,fontWeight:600,fontFamily:F}}>{s.cl}</div><div style={{color:T.td,fontSize:11,fontFamily:F,marginTop:2}}>{s.n+" shot"+(s.n!==1?"s":"")}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:700,color:T.g,fontFamily:M,lineHeight:1}}>{s.avg}<span style={{fontSize:10,fontWeight:400,color:T.td,marginLeft:2}}>yd</span></div><div style={{fontSize:10,color:T.td,fontFamily:M,marginTop:2}}>{s.min+"\u2013"+s.max}</div></div></div><div style={{marginTop:8,position:"relative",height:12,background:"rgba(128,128,128,0.04)",borderRadius:6}}>
<div style={{position:"absolute",top:3,height:6,borderRadius:3,background:T.g+"33",left:Math.max(0,s.min/300*100)+"%",width:Math.max(2,(s.max-s.min)/300*100)+"%",transition:"all 0.4s"}}/>
<div style={{position:"absolute",top:1,height:10,width:3,borderRadius:2,background:T.g,left:"calc("+Math.min(100,s.avg/300*100)+"% - 1.5px)",transition:"left 0.4s"}}/>
</div>
<div style={{display:"flex",justifyContent:"space-between",marginTop:3}}><span style={{fontSize:8,color:T.td,fontFamily:M}}>{s.min}</span><span style={{fontSize:8,color:T.td,fontFamily:M}}>{s.max}</span></div></Crd>)}</div></div>;
}

// ==================== MAIN APP ====================
function App(){
const[user,setUser]=useState(null);
const[profile,setProfile]=useState(null);
const[rounds,setRounds]=useState([]);
const[active,setActive]=useState(null);
const[tab,setTab]=useState("dashboard");
const[loading,setLoading]=useState(true);
const[isDark,setIsDark]=useState(true);
const[isPro,setIsPro]=useState(false);
const[showUpgrade,setShowUpgrade]=useState(false);
const T=isDark?dark:light;const toggle=()=>setIsDark(p=>!p);

// Check auth on mount
useEffect(()=>{
let sub=null;
// Nuclear fallback - ALWAYS show app after 3s
const fallback=setTimeout(()=>{console.log("Fallback: forcing loading=false");setLoading(false);},2000);
const init=async()=>{
try{
const timeout=new Promise((_,rej)=>setTimeout(()=>rej("timeout"),5000));
const check=sb.auth.getSession();
const result=await Promise.race([check,timeout]);
if(result?.data?.session?.user){
setUser(result.data.session.user);
try{await Promise.race([loadProfile(result.data.session.user.id),new Promise((_,r)=>setTimeout(()=>r("profile timeout"),4000))]);}catch(e2){}
try{await Promise.race([loadRounds(result.data.session.user.id),new Promise((_,r)=>setTimeout(()=>r("rounds timeout"),4000))]);}catch(e3){}
}
}catch(e){console.log("Auth init:",e);}
console.log("Auth init complete, showing app");
clearTimeout(fallback);
setLoading(false);
};
init();
try{
const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
if(event==="SIGNED_IN"&&session?.user){
setUser(session.user);
try{await loadProfile(session.user.id);}catch(e){}
try{await loadRounds(session.user.id);}catch(e){}
}else if(event==="SIGNED_OUT"){
setUser(null);setProfile(null);setRounds([]);setActive(null);
}
});
sub=subscription;
}catch(e){console.log("Auth listener error:",e);}
return()=>{try{if(sub)sub.unsubscribe();}catch(e){}};
},[]);

const loadProfile=async(uid)=>{
const{data,error}=await sb.from("profiles").select("*").eq("id",uid).single();
if(data){setProfile(data);if(data.is_pro)setIsPro(true);}
else{
// No profile found - create default
const u=await sb.auth.getUser();
const name=u?.data?.user?.user_metadata?.name||"Golfer";
const def={id:uid,name:name,color:"#10b981",home_course:"goat_hill",goal:null,created_at:new Date().toISOString()};
try{await sb.from("profiles").upsert(def);}catch(e){console.log("Profile create error:",e);}
setProfile(def);
}
// Check URL for upgrade success
const params=new URLSearchParams(window.location.search);
if(params.get("upgraded")==="true"){setIsPro(true);window.history.replaceState({},"",window.location.pathname);
try{await sb.from("profiles").update({is_pro:true}).eq("id",uid);}catch(e){}}
// Also check localStorage as fallback
if(localStorage.getItem("sticks_pro_"+uid)==="true")setIsPro(true);
};
const loadRounds=async(uid)=>{
const{data}=await sb.from("rounds").select("*").eq("user_id",uid).order("date",{ascending:false});
if(data)setRounds(data);
};

const handleAuth=async(u)=>{
setUser(u);
await loadProfile(u.id);
await loadRounds(u.id);
};
const handleLogout=async()=>{
await sb.auth.signOut();
setUser(null);setProfile(null);setRounds([]);setActive(null);setTab("dashboard");
};
const updateProfile=(p)=>setProfile(p);

const startRound=useCallback(r=>{
if(!isPro&&rounds.length>=FREE_ROUND_LIMIT){setShowUpgrade(true);return;}
setActive(r);setTab("play");
},[isPro,rounds.length]);
const updateRound=useCallback(r=>setActive(r),[]);
const finishRound=useCallback(async()=>{
if(active&&active.holes.length>0&&user){
const ts=active.holes.reduce((s,h)=>s+(h.sc||0),0);
const tp=active.holes.reduce((s,h)=>s+(h.pt||0),0);
const{data,error}=await sb.from("rounds").insert({
user_id:user.id,course_id:active.course_id,course_name:active.course_name,
tee:active.tee,cr:active.cr,sr:active.sr,date:active.date,
holes:active.holes,total_score:ts,total_putts:tp
}).select().single();
if(data)setRounds(p=>[data,...p]);
}
setActive(null);setTab("dashboard");
},[active,user]);

const deleteRound=useCallback(async(id)=>{
await sb.from("rounds").delete().eq("id",id);
setRounds(p=>p.filter(r=>r.id!==id));
},[]);

console.log("RENDER STATE:",{loading,user:!!user,profile:!!profile});
if(loading)return <div style={{minHeight:"100vh",background:"#09090b",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}><LOGO/><Spinner T={dark} size={24}/></div>;
if(!user){console.log("Rendering AuthScreen");return <AuthScreen onAuth={handleAuth} T={T}/>;}
if(!profile&&user){
const name=user.user_metadata?.name||"Golfer";
const def={id:user.id,name:name,color:"#10b981",home_course:"goat_hill",goal:null,created_at:new Date().toISOString()};
setProfile(def);
return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner T={T} size={32}/></div>;
}
if(!profile)return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner T={T} size={32}/></div>;

return <div style={{minHeight:"100vh",maxHeight:"100vh",overflow:"hidden",background:T.bg,fontFamily:F,maxWidth:480,margin:"0 auto",position:"relative",transition:"background 0.3s"}}>
{showUpgrade&&<UpgradeScreen user={user} T={T} onClose={()=>setShowUpgrade(false)}/>}
{tab==="dashboard"&&<Dashboard rounds={rounds} T={T} onToggle={toggle} profile={profile} isPro={isPro} onUpgrade={()=>setShowUpgrade(true)}/>}
{tab==="play"&&<Play active={active} onStart={startRound} onUpdate={updateRound} onFinish={finishRound} T={T} onToggle={toggle} profile={profile} isPro={isPro} onUpgrade={()=>setShowUpgrade(true)} roundCount={rounds.length} rounds={rounds}/>}
{tab==="rounds"&&<Rounds rounds={rounds} onDel={deleteRound} T={T} onToggle={toggle} profile={profile}/>}
{tab==="bag"&&<Bag rounds={rounds} T={T} onToggle={toggle} profile={profile} isPro={isPro} onUpgrade={()=>setShowUpgrade(true)}/>}
{tab==="profile"&&<ProfileScreen profile={profile} rounds={rounds} onUpdateProfile={updateProfile} onLogout={handleLogout} T={T} onToggle={toggle} isPro={isPro} onUpgrade={()=>setShowUpgrade(true)} user={user}/>}
<TabBar active={tab} onChange={setTab} T={T}/>
</div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  caches.keys().then(ks=>ks.forEach(k=>caches.delete(k)));
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));
}
</script>
</body>
